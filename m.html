<!DOCTYPE html>
<html>
<head>
    <title>Item Manager</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center text-primary mb-4">Item Manager</h2>

    <div class="input-group mb-3">
        <input type="text" id="item" class="form-control" placeholder="Enter Item">
        <button class="btn btn-success" onclick="addItem()">Add Item</button>
    </div>

    <table class="table table-bordered table-striped text-center">
        <thead class="table-dark">
            <tr>
                <th>S.No</th>
                <th>Item Name</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>

</div>

<script>
let count = 1;

function addItem() {

    let item = document.getElementById("item").value;

    if(item == ""){
        alert("Enter an Item");
        return;
    }

    let row = `
    <tr>
        <td>${count++}</td>
        <td>${item}</td>
        <td>
            <button class="btn btn-warning btn-sm"
            onclick="editRow(this)">Edit</button>
        </td>
        <td>
            <button class="btn btn-danger btn-sm"
            onclick="deleteRow(this)">Delete</button>
        </td>
    </tr>`;

    document.getElementById("tableBody").innerHTML += row;

    document.getElementById("item").value = "";
}

function editRow(btn) {
    let row = btn.parentNode.parentNode;
    let oldItem = row.cells[1].innerHTML;

    let newItem = prompt("Edit Item", oldItem);

    if(newItem != null && newItem != "") {
        row.cells[1].innerHTML = newItem;
    }
}

function deleteRow(btn) {
    btn.parentNode.parentNode.remove();
}
</script>

</body>
</html>
